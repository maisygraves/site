---
layout: default
---

<nav>
    {% include nav-bar.html %}
</nav>

<main class="post">
    <article>
        <header class="post-header">
            <p class="post-back">
                <a href="{{ './' | relative_url }}">← home</a>
            </p>

            <h1>{{ page.title }}</h1>

            {% if page.date %}
                <p class="post-meta">
                    {{ page.date | date: "%B %-d, %Y" }}
                </p>
            {% endif %}
        </header>

        <div class="post-content">
            {{ content }}
        </div>
    </article>
</main>
